<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cube Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="brand-dots">
          <span></span><span></span><span></span><span></span>
        </div>
        <span class="brand-name">Cube Trainer</span>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="card info">
      <div class="temp-pill">{{ this.cubeService.temp }}</div>

      <!-- Show one based on caseType -->
      <span class="tag corner"> {{this.nextCaseEl.caseType}}</span>
      <!-- <span class="tag edge">Edge</span> -->

      <!-- Letter pair -->
      <h1 class="image-code">{{ this.nextCaseName }}</h1>
      <!-- <p class="no-data">No letter pairs</p> -->

      <div class="divider"></div>

      <h5 class="case-name">{{ this.nextCaseEl.letterPairs[0].image }}</h5>
    </div>

    <div class="actions">
      <button class="btn-next"  (click)="getNextCase(false)">Next</button>
      <button class="btn-reset" (click)="resetCube()">Reset Cube</button>
    </div>

    <div class="actions secondary">
      <button class="btn-connect" (click)="connectCube('GAN')">Connect GAN</button>
      <button class="btn-connect" (click)="connectCube('MOYU')">Connect Moyu</button>
    </div>

  </div>
</body>
</html>
